    <style>
        /* ── Chase Chavez Brand System ─────────────────────────────────────────
           Athletic Blue  #005F87  — primary, headers, key elements (60%)
           Warm Slate     #565A5C  — secondary text, subheadings (30%)
           Performance Teal #00A3A3 — accent, data highlights, innovation
           Pure White     #FFFFFF  — backgrounds
           Light Gray     #F5F5F5  — subtle backgrounds
        ──────────────────────────────────────────────────────────────────── */
        :root {
            --blue:   #005F87;
            --blue-dark: #004668;
            --blue-light: #e6f2f8;
            --slate:  #565A5C;
            --slate-light: #f0f1f1;
            --teal:   #00A3A3;
            --teal-light: #e0f5f5;
            --white:  #FFFFFF;
            --gray:   #F5F5F5;
            --text:   #1a1a1a;
        }
        body {
            background: linear-gradient(150deg, #004668 0%, #005F87 50%, #007a9e 100%);
            min-height: 100vh;
            font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 95, 135, 0.12);
        }

        /* ── Navigation & Header ─────────────────────────────────────────── */
        .brand-header {
            background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
            border-bottom: 3px solid var(--teal);
        }
        .nav-btn {
            color: rgba(255,255,255,0.75);
            font-family: Arial, sans-serif;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.2s ease;
        }
        .nav-btn:hover { color: white; }
        .nav-btn-active {
            color: white;
            border-bottom: 2px solid var(--teal);
        }

        /* ── Cards ───────────────────────────────────────────────────────── */
        .brand-card {
            background: white;
            border: 1px solid rgba(0,95,135,0.1);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,95,135,0.08);
        }
        .brand-card-accent {
            border-left: 4px solid var(--blue);
        }

        /* ── Exercise rows ───────────────────────────────────────────────── */
        .exercise-row:hover { background: var(--blue-light); }
        .completed { background: rgba(0,163,163,0.08); opacity: 0.72; }
        .completed .exercise-name { text-decoration: line-through; color: var(--slate); }

        /* ── Inputs ──────────────────────────────────────────────────────── */
        input[type="text"], input[type="number"], input[type="checkbox"] { transition: all 0.2s ease; }
        input:focus { transform: scale(1.02); box-shadow: 0 0 0 3px rgba(0,95,135,0.15); outline: none; }

        /* ── Animations ──────────────────────────────────────────────────── */
        @keyframes slideInDown {
            from { transform: translateY(-100px); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }
        .animate-slide-in { animation: slideInDown 0.3s ease-out; }
        .progress-bar { transition: width 0.5s ease; }
        @keyframes confetti {
            0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
            100% { transform: translateY(1000px) rotate(720deg); opacity: 0; }
        }
        .confetti { position: fixed; width: 10px; height: 10px; animation: confetti 3s ease-out forwards; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .syncing-pulse { animation: pulse 1s infinite; }

        /* ── Week type indicators ─────────────────────────────────────────── */
        .current-week-indicator { border: 3px solid var(--teal) !important; box-shadow: 0 0 16px rgba(0,163,163,0.45); }
        .deload-week    { background: rgba(251,191,36,0.15);  border: 2px solid #f59e0b; }
        .test-week      { background: rgba(0,95,135,0.12);    border: 2px solid var(--blue); }
        .recovery-week  { background: rgba(0,163,163,0.12);   border: 2px solid var(--teal); }
        .general-prep-week { background: rgba(0,163,163,0.08); border: 2px solid rgba(0,163,163,0.4); }
        .race-week      { background: rgba(0,95,135,0.15);    border: 2px solid var(--blue); }

        /* ── Sync indicator ──────────────────────────────────────────────── */
        .sync-indicator {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
            font-family: Arial, sans-serif; letter-spacing: 0.04em;
            display: flex; align-items: center; gap: 8px; transition: all 0.3s ease;
        }
        .sync-online  { background: rgba(0,163,163,0.92); color: white; }
        .sync-offline { background: rgba(86,90,92,0.92);  color: white; }
        .sync-syncing { background: rgba(0,95,135,0.92);  color: white; }
        .sync-error   { background: rgba(220,38,38,0.92); color: white; }

        /* ── Typography helpers ──────────────────────────────────────────── */
        .brand-heading {
            font-family: Arial, sans-serif;
            font-weight: 700;
            color: var(--blue);
            letter-spacing: -0.01em;
        }
        .brand-subheading {
            font-family: Arial, sans-serif;
            font-weight: 600;
            color: var(--slate);
        }
        .brand-label {
            font-family: Arial, sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--slate);
        }

        /* ── Buttons ─────────────────────────────────────────────────────── */
        .btn-primary {
            background: var(--blue);
            color: white;
            font-family: Arial, sans-serif;
            font-weight: 700;
            letter-spacing: 0.03em;
            border-radius: 8px;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); }
        .btn-teal {
            background: var(--teal);
            color: white;
            font-family: Arial, sans-serif;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-teal:hover { background: #008a8a; transform: translateY(-1px); }

        /* ── Progress & data bars ────────────────────────────────────────── */
        .brand-progress-bg  { background: var(--blue-light); }
        .brand-progress-bar { background: linear-gradient(90deg, var(--blue), var(--teal)); }

        /* ── Badges ──────────────────────────────────────────────────────── */
        .badge-blue  { background: var(--blue);  color: white; font-family: Arial, sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.04em; padding: 2px 8px; border-radius: 4px; }
        .badge-teal  { background: var(--teal);  color: white; font-family: Arial, sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.04em; padding: 2px 8px; border-radius: 4px; }
        .badge-slate { background: var(--slate); color: white; font-family: Arial, sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.04em; padding: 2px 8px; border-radius: 4px; }

        /* ── Loading ─────────────────────────────────────────────────────── */
        /* loading styles are inline */

        /* ── Scrollbar ───────────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--gray); }
        ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#004668,#005F87);font-family:Arial,sans-serif;">
        <div style="color:white;font-size:28px;font-weight:700;letter-spacing:-0.01em;margin-bottom:12px">Chase Chavez</div>
        <div style="color:#00A3A3;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:40px">2026 Training System</div>
        <div style="display:flex;gap:10px;align-items:center;">
            <div style="width:10px;height:10px;border-radius:50%;background:#00A3A3;animation:loadDot 1.2s ease-in-out infinite;"></div>
            <div style="width:10px;height:10px;border-radius:50%;background:#00A3A3;animation:loadDot 1.2s ease-in-out 0.2s infinite;"></div>
            <div style="width:10px;height:10px;border-radius:50%;background:#00A3A3;animation:loadDot 1.2s ease-in-out 0.4s infinite;"></div>
        </div>
        <div style="color:rgba(255,255,255,0.5);font-size:12px;margin-top:24px;letter-spacing:0.06em">Loading...</div>
        <style>
            @keyframes loadDot {
                0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
                40% { transform: scale(1.2); opacity: 1; }
            }
        </style>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        window.addEventListener('load', function() {
            try {
                document.getElementById('loading').style.display = 'none';
                const { useState, useEffect, useRef, useCallback } = React;

                // Firebase Configuration
                const firebaseConfig = {
                    apiKey: "AIzaSyAO2npuLviCt4uN8SWS9TPUT17rHaPWu18",
                    authDomain: "chase-2026-training.firebaseapp.com",
                    databaseURL: "https://chase-2026-training-default-rtdb.firebaseio.com",
                    projectId: "chase-2026-training",
                    storageBucket: "chase-2026-training.firebasestorage.app",
                    messagingSenderId: "947893899748",
                    appId: "1:947893899748:web:55dc3d1d61d13c737bf7f1"
                };
                if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
                const database = firebase.database();
                const dataRef = database.ref('trainingData56Week');

                const TOTAL_WEEKS = 56;

                // ── Week date helpers — program starts Jan 1, 2026 ───────────────────────
                const PROGRAM_START = new Date('2026-01-05'); // First Monday of 2026 — Jan 1 is a Thursday
                const getWeekStartDate = (weekNum) => {
                    const d = new Date(PROGRAM_START);
                    d.setDate(d.getDate() + (weekNum - 1) * 7);
                    return d;
                };
                const getWeekEndDate = (weekNum) => {
                    const d = getWeekStartDate(weekNum);
                    d.setDate(d.getDate() + 6);
                    return d;
                };
                const fmtDate = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const fmtDateFull = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const getWeekLabel = (weekNum) => {
                    const start = getWeekStartDate(weekNum);
                    const end = getWeekEndDate(weekNum);
                    return fmtDate(start) + ' – ' + fmtDate(end);
                };
                // Returns the day-of-week date for a given session (0=Mon,1=Tue,etc.)
                const getSessionDate = (weekNum, dayOffset) => {
                    const d = getWeekStartDate(weekNum);
                    d.setDate(d.getDate() + dayOffset);
                    return fmtDate(d);
                };
                const DAY_OFFSETS = { Monday: 0, Tuesday: 1, Wednesday: 2, Thursday: 3, Friday: 4, Saturday: 5 };

                const volumeData = [
                    2, 3, 4, 5,  // Weeks 1-4: Recovery
                    6, 7, 8, 4,  // Weeks 5-8: Anatomical Adaptation
                    7, 8, 9, 5,  // Weeks 9-12: Hypertrophy 1
                    6, 7, 7, 4,  // Weeks 13-16: Strength 1
                    5, 6, 6, 3,  // Weeks 17-20: Power 1
                    8, 9, 9, 5,  // Weeks 21-24: Hypertrophy 2
                    6, 7, 8, 4,  // Weeks 25-28: Strength 2
                    5, 6, 6, 3,  // Weeks 29-32: Power 2
                    6, 7, 7, 4,  // Weeks 33-36: Job Transition Block
                    7, 7, 8, 4,  // Weeks 37-40: Strength-Power Integration
                    5, 5, 4, 3,  // Weeks 41-44: Peaking 1
                    5, 5, 4, 3,  // Weeks 45-48: Speed/Power Peaking
                    4, 4, 3, 2,  // Weeks 49-52: Taper Block
                    3, 2, 2, 1   // Weeks 53-56: Testing
                ];

                const intensityData = [
                    2, 3, 3, 4,  // Weeks 1-4: Recovery
                    4, 4, 5, 4,  // Weeks 5-8: Anatomical Adaptation
                    6, 6, 7, 5,  // Weeks 9-12: Hypertrophy 1
                    7, 8, 8, 6,  // Weeks 13-16: Strength 1
                    9, 9, 9, 7,  // Weeks 17-20: Power 1
                    7, 7, 8, 6,  // Weeks 21-24: Hypertrophy 2
                    8, 9, 9, 7,  // Weeks 25-28: Strength 2
                    9, 9, 10, 7, // Weeks 29-32: Power 2
                    7, 7, 8, 6,  // Weeks 33-36: Job Transition Block
                    9, 9, 9, 7,  // Weeks 37-40: Strength-Power Integration
                    9, 10, 10, 8,// Weeks 41-44: Peaking 1
                    9, 10, 10, 8,// Weeks 45-48: Speed/Power Peaking
                    7, 7, 6, 5,  // Weeks 49-52: Taper Block
                    10, 10, 10, 10// Weeks 53-56: Testing
                ];

                // CURRENT tested 1RMs — NOT goal weights. Retest every 8-12 weeks to update.
                const ONE_RM = { 'Squat': 293, 'Bench Press': 213, 'Trap Bar Deadlift': 405, 'Power Clean': 165 };

                // ═══ E1RM CHECK-IN SCHEDULE ═══════════════════════════════════════════════
                // Scheduled AMRAP sets every ~8 weeks to re-estimate 1RM via Epley formula.
                // Phase A/B (weeks 1-26): multiple lifts per check-in week (4-day schedule).
                // Phase C (weeks 27-56): staggered across 2 consecutive weeks to avoid
                //   overloading any single 30-min session. Power Clean is never AMRAP'd
                //   (technique-risky above 3 reps) — tested only at week 55.
                // Week 50 is a "Primer Week" — light singles at 87-93% to rehearse max attempts.
                // Week 55 is the final true 1RM test (already built into Meso 13 W3).
                const E1RM_CHECK_WEEKS = {
                    8:  ['Squat', 'Bench Press'],
                    16: ['Squat', 'Bench Press', 'Trap Bar Deadlift'],
                    24: ['Squat', 'Bench Press', 'Trap Bar Deadlift'],
                    34: ['Squat'],
                    35: ['Bench Press', 'Trap Bar Deadlift'],
                    42: ['Squat'],
                    43: ['Bench Press', 'Trap Bar Deadlift']
                };
                const E1RM_PRIMER_WEEKS = [50]; // Light singles, not AMRAP
                const isE1RMCheckWeek = (weekNum, liftName) =>
                    E1RM_CHECK_WEEKS[weekNum] && E1RM_CHECK_WEEKS[weekNum].includes(liftName);
                const isE1RMPrimerWeek = (weekNum) => E1RM_PRIMER_WEEKS.includes(weekNum);
                const e1RMNote = (weekNum, liftName, baseNote) => {
                    if (isE1RMCheckWeek(weekNum, liftName)) {
                        return "💪 e1RM CHECK — Last set = AMRAP to technical failure · log reps · update 1RM Calc tab · " + baseNote;
                    }
                    if (isE1RMPrimerWeek(weekNum) && ['Squat','Bench Press','Trap Bar Deadlift'].includes(liftName)) {
                        return "🎯 PRIMER SET — 1 single @ 87-93% · rehearse max attempt · no AMRAP · " + baseNote;
                    }
                    return baseNote;
                };

                const mesocycles = [
                    { name: "Recovery & General Prep", weeks: 4, focus: "Post-race recovery and foundation", trainingEmphasis: "Active Recovery" },
                    { name: "Anatomical Adaptation", weeks: 4, focus: "Build work capacity and movement patterns", trainingEmphasis: "GPP" },
                    { name: "Hypertrophy Block 1", weeks: 4, focus: "Muscle cross-sectional area", trainingEmphasis: "Muscle Building" },
                    { name: "Strength Block 1", weeks: 4, focus: "Maximal force production", trainingEmphasis: "Basic Strength" },
                    { name: "Power Block 1", weeks: 4, focus: "Rate of force development", trainingEmphasis: "Speed-Strength" },
                    { name: "Hypertrophy Block 2", weeks: 4, focus: "Advanced hypertrophy", trainingEmphasis: "Functional Hypertrophy" },
                    { name: "Strength Block 2", weeks: 4, focus: "Competition-specific loads", trainingEmphasis: "Advanced Strength" },
                    { name: "Power Block 2", weeks: 4, focus: "Peak power output", trainingEmphasis: "Competition Power" },
                    { name: "Job Transition Block", weeks: 4, focus: "Adapt to 3-day compact training", trainingEmphasis: "Schedule Consolidation" },
                    { name: "Strength-Power Integration", weeks: 4, focus: "Integrate strength with power", trainingEmphasis: "Complex Training" },
                    { name: "Peaking Phase 1", weeks: 4, focus: "Peak strength abilities", trainingEmphasis: "Strength Peak" },
                    { name: "Speed/Power Peaking", weeks: 4, focus: "Peak VJ and 40yd dash", trainingEmphasis: "Explosive Peak" },
                    { name: "Taper Block", weeks: 4, focus: "Reduce volume, preserve intensity before testing", trainingEmphasis: "Taper for Testing" },
                    { name: "Testing & Realization", weeks: 4, focus: "Test all goals", trainingEmphasis: "Max Out" }
                ];

                // ── 5K RACE PREP OVERLAY (Weeks 7-17, Race: Apr 30) ──────────────────────
                // Only overrides Tuesday (quality run) and Thursday (easy run).
                // Saturday stays as PLYOS + SPRINT MECHANICS — 1 speed workout per week only.
                const fiveKOverlay = {
                    7:  { tue: { name: "3x1 Mile @ 7:30/mi", mileage: 3.5, notes: "5K Prep W1 · 2min rest | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 25min Run", mileage: 2.5, notes: "True easy pace 8:30-9:00/mi only" } },
                    8:  { tue: { name: "2x1 Mile @ 7:20 + 4x200m", mileage: 3, notes: "5K Prep W2 (Deload) · 90s rest" },
                          thu: { name: "Easy 20min Run", mileage: 2, notes: "True easy pace 8:30-9:00/mi only" } },
                    9:  { tue: { name: "4x800m @ 6:35/mi", mileage: 3.5, notes: "5K Prep W3 · 90s rest | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 30min Run", mileage: 3, notes: "True easy pace 8:30-9:00/mi only" } },
                    10: { tue: { name: "20min Tempo @ 7:10/mi", mileage: 3, notes: "5K Prep W4 · comfortably hard | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 30min Run", mileage: 3, notes: "True easy pace 8:30-9:00/mi only" } },
                    11: { tue: { name: "5x800m @ 6:30/mi", mileage: 4, notes: "5K Prep W5 · 90s rest | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 35min Run", mileage: 3.5, notes: "True easy pace 8:30-9:00/mi only" } },
                    12: { tue: { name: "3x800m @ 6:30/mi", mileage: 2.5, notes: "5K Prep W6 (Deload) · 2min rest | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 25min Run", mileage: 2.5, notes: "True easy pace 8:30-9:00/mi only" } },
                    13: { tue: { name: "25min Tempo @ 7:05/mi", mileage: 3.5, notes: "5K Prep W7 · strong sustained effort | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 30min Run", mileage: 3, notes: "True easy pace 8:30-9:00/mi only" } },
                    14: { tue: { name: "6x800m @ 6:25/mi", mileage: 4.5, notes: "5K Prep W8 · 2min rest | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 30min Run", mileage: 3, notes: "True easy pace 8:30-9:00/mi only" } },
                    15: { tue: { name: "3x800m @ 6:40/mi", mileage: 2.5, notes: "5K Prep W10 (Taper) · stay fresh | Goal: Apr 30 Sub-21:00" },
                          thu: { name: "Easy 20min Run", mileage: 2, notes: "True easy pace 8:30-9:00/mi only" } },
                    16: { tue: { name: "2x1 Mile @ 6:45/mi (race pace)", mileage: 2.5, notes: "Final race pace work · feel the target · 3min rest" },
                          thu: { name: "Easy 20min + 4x100m strides", mileage: 2, notes: "Last tune-up · legs should feel fresh and snappy" } },
                    17: { tue: { name: "Easy 15min + 4x100m strides", mileage: 1.5, notes: "2 days before race · feel light and fast · no hard effort" },
                          thu: { name: "🏁 5K RACE — Sub-21:00 Goal! (Apr 30)", mileage: 3.1, notes: "Mile 1: 7:00 | Mile 2: 6:55 | Mile 3: 6:40 | TARGET: 20:35-20:45 🏆" } },
                };

                function generateAllWeeks() {
                    const weeks = [];
                    let weekNum = 1;
                    mesocycles.forEach((meso, mesoIndex) => {
                        for (let weekInMeso = 0; weekInMeso < meso.weeks; weekInMeso++) {
                            if (weekNum > TOTAL_WEEKS) break;
                            const volume = volumeData[weekNum - 1];
                            const intensity = intensityData[weekNum - 1];
                            const isDeload = (weekInMeso === 3) && mesoIndex > 0;
                            const isTestWeek = weekNum >= 53;
                            const isRecovery = mesoIndex === 0 && weekInMeso < 2;
                            const isGeneralPrep = mesoIndex === 0 && weekInMeso >= 2;
                            const is5KRaceWeek = weekNum === 17;
                            weeks.push({
                                weekNum, mesocycle: mesoIndex + 1, phase: meso.name, focus: meso.focus,
                                trainingEmphasis: meso.trainingEmphasis, volume, intensity, isDeload,
                                isTestWeek, isRecovery, isGeneralPrep, is5KRaceWeek, weekInBlock: weekInMeso + 1,
                                sessions: generateSessions(weekNum, mesoIndex, volume, isDeload, weekInMeso, isRecovery)
                            });

                            // Apply 5K overlay for race prep (weeks 7-17, Apr 30 Sub-21 goal)
                            // Only overrides Tuesday and Thursday — Saturday stays as plyos + sprint mechanics
                            if (fiveKOverlay[weekNum]) {
                                const ov = fiveKOverlay[weekNum];
                                const lastWeek = weeks[weeks.length - 1];
                                lastWeek.sessions[1] = {
                                    name: "5K Prep Quality Run",
                                    day: "Tuesday",
                                    exercises: [{ name: ov.tue.name, sets: 1, reps: "1", weight: "", percent: "", completed: false, notes: ov.tue.notes, mileage: ov.tue.mileage, isRun: true }],
                                    notes: "🏃 5K Prep — Apr 30 Race Goal: Sub-21:00 (1 speed session/week)"
                                };
                                lastWeek.sessions[3] = {
                                    name: weekNum === 17 ? "🏁 5K RACE DAY" : "Easy Recovery Run",
                                    day: "Thursday",
                                    exercises: [{ name: ov.thu.name, sets: 1, reps: "1", weight: "", percent: "", completed: false, notes: ov.thu.notes, mileage: ov.thu.mileage, isRun: true }],
                                    notes: weekNum === 17 ? "🏁 RACE DAY — Apr 30 5K — Sub-21:00!" : "Easy only — 8:30-9:00/mi, no pushing"
                                };
                                // Saturday NOT overridden — keeps plyos + sprint mechanics for 40yd dash goal
                            }

                            weekNum++;
                        }
                    });
                    return weeks;
                }


                // ── PLYOMETRIC PERIODIZATION v2 ─────────────────────────────────────────────
                // Primary plyo day = Saturday (before sprints). Monday = activation/PAP only.
                // ═══ PLUS PLYOS TIER SYSTEM (Matt McInnes Watson) ══════════════════════
                // Four tiers classify plyos by GCT + intent:

                        [{name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true},
                         {name: "40yd Sprint (standing)", sets: 3, reps: "40yd", weight: "", percent: "", completed: false, notes: "Maintenance · 90% effort · TIME", isSprint: true}],
                        // 9 Strength-Power Integration — complex sprint
                        [{name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true},
                         {name: "Complex: Power Clean → 40yd Sprint", sets: 5, reps: "2+40yd", weight: "", percent: "", completed: false, notes: "Olympic lift → explosive sprint · PAP · TIME sprint", isSprint: true},
                         {name: "Flying 20yd", sets: 4, reps: "20yd", weight: "", percent: "", completed: false, notes: "20yd build-in → 20yd timed · max velocity training", isSprint: true}],
                        // 10 Peaking 1 — sub-5.0 focus begins
                        [{name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true},
                         {name: "40yd Sprint — PEAK EFFORT", sets: 5, reps: "40yd", weight: "", percent: "", completed: false, notes: "TIME EVERY REP · 4min rest · goal: sub-5.2 this week", isSprint: true},
                         {name: "A-Skip + Wall Drive Primer", sets: 2, reps: "20yd each", weight: "", percent: "", completed: false, notes: "Mechanic freshness before sprints", isSprint: true}],
                        // 11 Speed/Power Peaking — competition-ready sprints
                        [{name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true},
                         {name: "40yd Sprint — COMPETITION PREP", sets: 5, reps: "40yd", weight: "", percent: "", completed: false, notes: "TIME ALL · full 5min rest · target sub-5.0 · log each time", isSprint: true},
                         {name: "3-Point Start Drill", sets: 3, reps: "10yd", weight: "", percent: "", completed: false, notes: "Perfect start mechanics · explosive first step", isSprint: true}],
                        // 12 Taper Block (Phase C — dead code, early returned)
                        [{name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true},
                         {name: "40yd Sprint", sets: 3, reps: "40yd", weight: "", percent: "", completed: false, notes: "Sharpening only · 90% · rest 5min · TIME", isSprint: true}],
                        // 13 Testing — test day
                        [{name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true},
                         {name: "🏆 40-YARD DASH TEST", sets: 3, reps: "40yd", weight: "", percent: "", completed: false, notes: "Goal: Sub-5.0 · 3-point start · 10min rest between · TIME ALL 3", isSprint: true}],
                    ];
                    return phases[mesoIndex] || [];
                }

                // ═══ PHASE C SESSION GENERATOR (Weeks 27-56, July 6, 2026+) ═══════════════
                // New job reality: 3 days/week, 30 min per lift session, Daily Mile separate.
                // Schedule: Mon (Lower+Plyo) · Wed (Upper+Trap) · Sun (Speed+Clean+Plyo)
                // Tue/Thu = Daily Mile only · Fri = travel · Sat = gameday
                function generatePhaseCSessions(weekNum, mesoIndex, isDeload, weekInBlock) {
                    let squatPct, benchPct, trapPct, cleanPct, mainSets, mainReps;

                    if (mesoIndex === 6) {
                        // Meso 6 Strength 2 — weeks 27-28 are ACCOMMODATION to new schedule
                        mainSets = isDeload ? 3 : 4;
                        mainReps = "4";
                        squatPct = isDeload ? 0.75 : 0.78 + weekInBlock * 0.02;
                        benchPct = isDeload ? 0.72 : 0.75 + weekInBlock * 0.02;
                        trapPct  = isDeload ? 0.78 : 0.82 + weekInBlock * 0.02;
                        cleanPct = 0.72;
                    } else if (mesoIndex === 7) {
                        // Meso 7 Power 2 — weeks 29-32
                        mainSets = isDeload ? 3 : 4;
                        mainReps = "3";
                        squatPct = isDeload ? 0.78 : 0.82 + weekInBlock * 0.02;
                        benchPct = isDeload ? 0.75 : 0.78 + weekInBlock * 0.02;
                        trapPct  = isDeload ? 0.80 : 0.84 + weekInBlock * 0.02;
                        cleanPct = isDeload ? 0.75 : 0.80;
                    } else if (mesoIndex === 8) {
                        // Meso 8 Job Transition Block — weeks 33-36 (consolidation)
                        mainSets = 3;
                        mainReps = "5";
                        squatPct = 0.75 + weekInBlock * 0.015;
                        benchPct = 0.72 + weekInBlock * 0.015;
                        trapPct  = 0.78 + weekInBlock * 0.015;
                        cleanPct = 0.72;
                    } else if (mesoIndex === 9) {
                        // Meso 9 Strength-Power Integration — weeks 37-40
                        mainSets = isDeload ? 3 : 4;
                        mainReps = isDeload ? "4" : "3-4";
                        squatPct = isDeload ? 0.80 : 0.84 + weekInBlock * 0.02;
                        benchPct = isDeload ? 0.78 : 0.82 + weekInBlock * 0.02;
                        trapPct  = isDeload ? 0.82 : 0.86 + weekInBlock * 0.02;
                        cleanPct = 0.78;
                    } else if (mesoIndex === 10) {
                        // Meso 10 Peaking Phase 1 — weeks 41-44 (strength peak)
                        mainSets = isDeload ? 3 : 4;
                        mainReps = isDeload ? "3" : "2-3";
                        squatPct = isDeload ? 0.82 : 0.88 + weekInBlock * 0.02;
                        benchPct = isDeload ? 0.80 : 0.85 + weekInBlock * 0.02;
                        trapPct  = isDeload ? 0.85 : 0.90 + weekInBlock * 0.02;
                        cleanPct = 0.80;
                    } else if (mesoIndex === 11) {
                        // Meso 11 Speed/Power Peaking — weeks 45-48
                        mainSets = isDeload ? 3 : 4;
                        mainReps = "3";
                        squatPct = isDeload ? 0.78 : 0.82 + weekInBlock * 0.02;
                        benchPct = isDeload ? 0.76 : 0.80 + weekInBlock * 0.02;
                        trapPct  = isDeload ? 0.80 : 0.85 + weekInBlock * 0.02;
                        cleanPct = isDeload ? 0.78 : 0.82;
                    } else if (mesoIndex === 12) {
                        // Meso 12 Taper Block — weeks 49-52 (volume down, intensity preserved)
                        mainSets = 3;
                        mainReps = "2-3";
                        squatPct = weekInBlock <= 1 ? 0.85 : (weekInBlock === 2 ? 0.82 : 0.75);
                        benchPct = weekInBlock <= 1 ? 0.82 : (weekInBlock === 2 ? 0.78 : 0.72);
                        trapPct  = weekInBlock <= 1 ? 0.88 : (weekInBlock === 2 ? 0.85 : 0.78);
                        cleanPct = 0.78;
                    } else {
                        // Meso 13 Testing & Realization — weeks 53-56
                        mainSets = weekInBlock <= 1 ? 3 : 2;
                        mainReps = weekInBlock <= 1 ? "2" : "1-2";
                        squatPct = weekInBlock === 0 ? 0.90 : weekInBlock === 1 ? 0.93 : weekInBlock === 2 ? 0.95 : 1.0;
                        benchPct = weekInBlock === 0 ? 0.87 : weekInBlock === 1 ? 0.92 : weekInBlock === 2 ? 0.95 : 1.0;
                        trapPct  = weekInBlock === 0 ? 0.90 : weekInBlock === 1 ? 0.95 : weekInBlock === 2 ? 0.98 : 1.0;
                        cleanPct = weekInBlock === 0 ? 0.82 : weekInBlock === 1 ? 0.87 : weekInBlock === 2 ? 1.0 : 1.0;
                    }
                    cleanPct = Math.min(cleanPct, 0.87);

                    const squatWeight = Math.round(ONE_RM['Squat'] * squatPct / 5) * 5;
                    const benchWeight = Math.round(ONE_RM['Bench Press'] * benchPct / 5) * 5;
                    const trapWeight  = Math.round(ONE_RM['Trap Bar Deadlift'] * trapPct / 5) * 5;
                    const cleanWeight = Math.round(ONE_RM['Power Clean'] * cleanPct / 5) * 5;

                    const isTestWeek = (mesoIndex === 13 && weekInBlock === 2);

                    // ─── PLUS PLYOS TIER ROTATION (Monday main plyo day) ───────
                    // 4-week meso cycle: W1=Med+Light · W2=Med+Deep · W3=Med+Ping · W4=Deload Light only
                    // MEDIUM is the constant driver (CMJ is VJ-specific); rotate partner tier for stimulus variety.
                    let plyoA, plyoB;
                    if (isDeload || weekInBlock === 3) {
                        // Deload / W4 — LIGHT only (low-intensity reactive, recovery)
                        plyoA = {name: "[LIGHT] Pogo Hops (low amplitude)", sets: 3, reps: "10", weight: "", percent: "", completed: false, notes: "Ankle stiffness · <0.2s GCT · extensive tier · recovery week · contacts: 30", isPlyo: true, plyoTier: "LIGHT", contacts: 30};
                        plyoB = null;
                    } else if (weekInBlock === 0) {
                        // W1 — MEDIUM + LIGHT (introduction to block)
                        plyoA = {name: "[MEDIUM] CMJ (hands on hips)", sets: 3, reps: "3", weight: "", percent: "", completed: false, notes: "Max intent · post-squat PAP · elastic locomotion · 0.15-0.25s GCT · contacts: 9", isPlyo: true, plyoTier: "MEDIUM", contacts: 9};
                        plyoB = {name: "[LIGHT] A-Skip + Pogo Series 20yd", sets: 3, reps: "20yd", weight: "", percent: "", completed: false, notes: "Reactive joint prep · extensive pattern · teach rhythm · contacts: 30", isPlyo: true, plyoTier: "LIGHT", contacts: 30};
                    } else if (weekInBlock === 1) {
                        // W2 — MEDIUM + DEEP (eccentric loading / absorption)
                        plyoA = {name: "[MEDIUM] CMJ (max height)", sets: 4, reps: "3", weight: "", percent: "", completed: false, notes: "Peak CMJ expression · drive floor away · 3min rest between sets · contacts: 12", isPlyo: true, plyoTier: "MEDIUM", contacts: 12};
                        plyoB = {name: "[DEEP] Depth Drop w/ 2-sec Hold (30cm)", sets: 3, reps: "3", weight: "", percent: "", completed: false, notes: "Absorb deep + hold 2s · eccentric braking · >0.25s GCT intentional · contacts: 9", isPlyo: true, plyoTier: "DEEP", contacts: 9};
                    } else {
                        // W3 (weekInBlock === 2) — MEDIUM + PING (peak reactivity)
                        plyoA = {name: "[MEDIUM] CMJ (hands on hips)", sets: 3, reps: "3", weight: "", percent: "", completed: false, notes: "Max intent · post-squat PAP · RECORD HEIGHT · contacts: 9", isPlyo: true, plyoTier: "MEDIUM", contacts: 9};
                        plyoB = {name: mesoIndex <= 9 ? "[PING] Reactive Depth Jump (30cm)" : "[PING] Reactive Depth Jump (40cm)", sets: 3, reps: "3", weight: "", percent: "", completed: false, notes: "Minimize GCT · stiff ankle shock · <0.15s goal · hard surface · contacts: 9", isPlyo: true, plyoTier: "PING", contacts: 9};
                    }
                    // Test-week override: Meso 13 W3 tests CMJ (the VJ goal)
                    if (isTestWeek) {
                        plyoA = {name: "🏆 [MEDIUM] CMJ TEST", sets: 3, reps: "3", weight: "", percent: "", completed: false, notes: "🏆 Goal: 18\" VJ · Record every rep · full recovery 2min between", isPlyo: true, isPlyoTest: true, plyoTier: "MEDIUM", contacts: 9};
                        plyoB = {name: "[PING] Reactive DJ (confirmation)", sets: 2, reps: "3", weight: "", percent: "", completed: false, notes: "Peak reactivity confirmation · short GCT · contacts: 6", isPlyo: true, plyoTier: "PING", contacts: 6};
                    }

                    // ─── Day 1 (Monday): Lower + Plyo · 30 min ─────────────────
                    const mondayExercises = [
                        {name: "[LIGHT] Warm-up: Pogos + A-skip + bodyweight squats", sets: 1, reps: "3min", weight: "", percent: "", completed: false, notes: "Joint/ankle prep · extensive tier · <0.2s GCT teach"},
                        {name: isTestWeek ? "🏆 SQUAT TEST" : "Squat", sets: mainSets, reps: mainReps, weight: String(squatWeight), percent: Math.round(squatPct*100)+"%", completed: false, notes: isTestWeek ? "🏆 Goal: 365 lbs · full warm-up · spotter" : e1RMNote(weekNum, 'Squat', "Main lift · ~15min including rest · 2-3min between sets")},
                        plyoA,
                        ...(plyoB ? [plyoB] : []),
                        {name: "Walking Lunge or SL RDL", sets: 2, reps: "6/side", weight: "BW or light DB", percent: "", completed: false, notes: "Unilateral accessory · ~3min · finish strong"}
                    ];

                    // ─── Day 2 (Tuesday): Daily Mile only ──────────────────────
                    const tuesdayExercises = [
                        {name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min · run whenever fits", mileage: 1, isRun: true}
                    ];

                    // ─── Day 3 (Wednesday): Upper + Trap Bar · 30 min ──────────
                    const wednesdayExercises = [
                        {name: "Warm-up: Band pull-aparts + Shoulder dislocates", sets: 1, reps: "2min", weight: "", percent: "", completed: false, notes: "Shoulder prep · bands"},
                        {name: isTestWeek ? "🏆 BENCH PRESS TEST" : "Bench Press", sets: mainSets, reps: mainReps, weight: String(benchWeight), percent: Math.round(benchPct*100)+"%", completed: false, notes: isTestWeek ? "🏆 Goal: 275 lbs · spotter required" : e1RMNote(weekNum, 'Bench Press', "Main upper · ~12min · 2-3min rest")},
                        {name: isTestWeek ? "🏆 TRAP BAR DL TEST" : "Trap Bar Deadlift", sets: 3, reps: mainReps, weight: String(trapWeight), percent: Math.round(trapPct*100)+"%", completed: false, notes: isTestWeek ? "🏆 Goal: 450 lbs · hip drive · push floor away" : e1RMNote(weekNum, 'Trap Bar Deadlift', "Posterior chain · ~10min · hip drive")},
                        {name: "DB Row", sets: 3, reps: "8", weight: "challenging", percent: "", completed: false, notes: "Back volume + shoulder health · ~4min"}
                    ];

                    // ─── Day 4 (Thursday): Daily Mile only ─────────────────────
                    const thursdayExercises = [
                        {name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Easy pace ~9min · run whenever fits", mileage: 1, isRun: true}
                    ];

                    // ─── Day 5 (Friday): Rest / Travel ─────────────────────────
                    const fridayExercises = [
                        {name: "Daily Mile (travel-dependent)", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "If travel allows · else full rest day · keep legs fresh", mileage: 1, isRun: true}
                    ];

                    // ─── Day 6 (Saturday): Gameday (no training) ───────────────
                    const saturdayExercises = [
                        {name: "GAMEDAY — Work Day", sets: 1, reps: "—", weight: "", percent: "", completed: false, notes: "No training · long day on feet · hydrate + fuel well"}
                    ];

                    // ─── Day 7 (Sunday): Speed + Clean + Plyo · 30 min ─────────
                    const is40ydTest = isTestWeek;
                    const is40ydPCTest = (mesoIndex === 13 && weekInBlock === 2);
                    const sprintSets = isDeload ? 3 : (mesoIndex >= 11 ? 4 : 5);
                    const sprintName = is40ydTest ? "🏆 40-YARD DASH TEST" :
                                       mesoIndex >= 10 ? "40yd Sprint — PEAK EFFORT" :
                                       "40yd Sprint (w/ 1080 or gates)";
                    const sprintNote = is40ydTest ? "🏆 Goal: Sub-5.0 · 10min rest between · TIME ALL reps · 3-point start" :
                                       mesoIndex >= 10 ? "⚡ Peak sprint work · TIME every rep · 4min full CNS recovery · gates" :
                                       "40yd sprints · 3-4min rest · gates or 1080 · TIME each rep";
                    const sundayExercises = [
                        {name: "[LIGHT] Dynamic Warm-up: A-skips + Wall Drills + Low Pogos", sets: 1, reps: "5min", weight: "", percent: "", completed: false, notes: "Wall drive series · A-skip 2x20yd · low pogos 2x10 · extensive joint prep"},
                        {name: sprintName, sets: sprintSets, reps: "40yd", weight: "", percent: "", completed: false, notes: sprintNote, isSprint: true},
                        {name: is40ydPCTest ? "🏆 POWER CLEAN TEST" : "Power Clean", sets: 3, reps: "2", weight: String(cleanWeight), percent: Math.round(cleanPct*100)+"%", completed: false, notes: is40ydPCTest ? "🏆 Goal: 225 lbs · technique over load · 3min rest" : "Speed-strength · explosive · 2min rest"},
                        {name: mesoIndex >= 10 ? "[PING] Speed Hops (unilateral 15yd)" : "[MEDIUM] Broad Jump or SL Lateral Hop", sets: 3, reps: "3", weight: "", percent: "", completed: false, notes: mesoIndex >= 10 ? "Max reactivity · short GCT · locomotion-specific · peak tier" : "Horizontal power expression · 2min rest · submaximal elastic", isPlyo: true, plyoTier: mesoIndex >= 10 ? "PING" : "MEDIUM"},
                        {name: "Daily Mile (separate)", sets: 1, reps: "1 mile", weight: "", percent: "", completed: false, notes: "Run separately from sprint session · easy pace", mileage: 1, isRun: true}
                    ];

                    return [
                        { name: "Day 1: Lower + Plyo", day: "Monday", exercises: mondayExercises, notes: "⏱ 30min · Squat + Plus Plyos tier: " + (isDeload || weekInBlock === 3 ? "LIGHT (deload)" : weekInBlock === 0 ? "MED+LIGHT" : weekInBlock === 1 ? "MED+DEEP" : "MED+PING") },
                        { name: "Daily Mile Only", day: "Tuesday", exercises: tuesdayExercises, notes: "No lift · Daily Mile only · recovery" },
                        { name: "Day 2: Upper + Trap Bar", day: "Wednesday", exercises: wednesdayExercises, notes: "⏱ 30min compact · Bench + Trap Bar + Row" },
                        { name: "Daily Mile Only", day: "Thursday", exercises: thursdayExercises, notes: "No lift · Daily Mile only · recovery" },
                        { name: "Rest / Travel", day: "Friday", exercises: fridayExercises, notes: "Travel day · Daily Mile if possible" },
                        { name: "GAMEDAY", day: "Saturday", exercises: saturdayExercises, notes: "Working · no training" },
                        { name: "Day 3: Speed + Clean + Plyo", day: "Sunday", exercises: sundayExercises, notes: "⏱ 30min · 40yd + Power Clean + Plus Plyos " + (mesoIndex >= 10 ? "PING tier" : "MEDIUM tier") }
                    ];
                }

                function generateSessions(weekNum, mesoIndex, volume, isDeload, weekInBlock, isRecovery) {
                    // ═══ PHASE C BRANCH (Weeks 27-56, July 6, 2026+) ════════════
                    // 3 days/week × 30 min — new job reality
                    if (weekNum >= 27) {
                        return generatePhaseCSessions(weekNum, mesoIndex, isDeload, weekInBlock);
                    }
                    const prog = 1 + (weekNum * 0.003);
                    let mainReps, mainSets, auxReps, auxSets;
                    // ── DIFFERENTIATED % CURVES ──────────────────────────────────
                    // Squat: standard strength curve
                    // Bench: 3-5% lower in str/pow phases — needs more submaximal volume to progress
                    // Trap Bar DL: 2-5% higher — mechanical advantage allows heavier relative loads
                    // Power Clean: technique-capped at 87% — velocity > load always
                    let squatPct, benchPct, trapPct, cleanPct;
                    let benchSets, benchReps; // bench may differ from mainSets/mainReps

                    if (mesoIndex === 0) {
                        mainReps = isRecovery ? "15-20" : "12-15"; mainSets = isRecovery ? 2 : 3;
                        auxReps = "12"; auxSets = 2;
                        squatPct = 0.45 + weekInBlock * 0.03;
                        benchPct = 0.45 + weekInBlock * 0.03;
                        trapPct  = 0.45 + weekInBlock * 0.03;
                        cleanPct = 0.50;
                        benchSets = mainSets; benchReps = mainReps;
                    } else if (mesoIndex === 1) {
                        mainReps = isDeload ? "12" : "12-15"; mainSets = isDeload ? 2 : 3;
                        auxReps = "12-15"; auxSets = 3;
                        squatPct = isDeload ? 0.50 : 0.50 + weekInBlock * 0.03;
                        benchPct = isDeload ? 0.48 : 0.48 + weekInBlock * 0.03;
                        trapPct  = isDeload ? 0.52 : 0.52 + weekInBlock * 0.03;
                        cleanPct = 0.55;
                        benchSets = mainSets; benchReps = mainReps;
                    } else if (mesoIndex === 2 || mesoIndex === 5) {
                        mainReps = isDeload ? "10" : "8-10"; mainSets = isDeload ? 3 : 4;
                        auxReps = "10-12"; auxSets = 3;
                        const sqBase = mesoIndex === 5 ? 0.70 : 0.65;
                        squatPct = isDeload ? sqBase : sqBase + weekInBlock * 0.025;
                        const bpBase = mesoIndex === 5 ? 0.67 : 0.62;
                        benchPct = isDeload ? bpBase : bpBase + weekInBlock * 0.025;
                        const trBase = mesoIndex === 5 ? 0.72 : 0.67;
                        trapPct = isDeload ? trBase : trBase + weekInBlock * 0.025;
                        cleanPct = mesoIndex === 5 ? 0.62 : 0.60;
                        benchSets = isDeload ? 3 : 4; benchReps = isDeload ? "10" : "10-12";
                    } else if (mesoIndex === 3 || mesoIndex === 6) {
                        mainReps = isDeload ? "5" : weekInBlock <= 1 ? "6" : weekInBlock === 2 ? "5" : "3-4";
                        mainSets = isDeload ? 3 : 5; auxReps = "6-8"; auxSets = 4;
                        const sqBase = mesoIndex === 6 ? 0.80 : 0.75;
                        squatPct = isDeload ? sqBase : sqBase + weekInBlock * 0.03;
                        const bpBase = mesoIndex === 6 ? 0.77 : 0.72;
                        benchPct = isDeload ? bpBase : bpBase + weekInBlock * 0.025;
                        const trBase = mesoIndex === 6 ? 0.82 : 0.77;
                        trapPct = isDeload ? trBase : trBase + weekInBlock * 0.03;
                        cleanPct = mesoIndex === 6 ? 0.70 : 0.65;
                        benchSets = isDeload ? 3 : 5;
                        benchReps = isDeload ? "6" : weekInBlock <= 1 ? "6" : weekInBlock === 2 ? "5" : "4-5";
                    } else if (mesoIndex === 4 || mesoIndex === 7) {
                        mainReps = isDeload ? "3" : "2-3"; mainSets = isDeload ? 3 : 5;
                        auxReps = "5"; auxSets = 3;
                        const sqBase = mesoIndex === 7 ? 0.87 : 0.85;
                        squatPct = isDeload ? sqBase : sqBase + weekInBlock * 0.015;
                        const bpBase = mesoIndex === 7 ? 0.84 : 0.82;
                        benchPct = isDeload ? bpBase : bpBase + weekInBlock * 0.015;
                        const trBase = mesoIndex === 7 ? 0.89 : 0.87;
                        trapPct = isDeload ? trBase : trBase + weekInBlock * 0.015;
                        cleanPct = mesoIndex === 7 ? 0.78 : 0.75;
                        benchSets = isDeload ? 3 : 5;
                        benchReps = isDeload ? "3" : "3-4";
                    } else if (mesoIndex >= 10) {
                        mainReps = isDeload ? "2" : "1-2"; mainSets = isDeload ? 2 : 3;
                        auxReps = "3-5"; auxSets = 2;
                        squatPct = weekNum >= 55 ? 1.0 : 0.92;
                        benchPct = weekNum >= 55 ? 1.0 : 0.90;
                        trapPct  = weekNum >= 55 ? 1.0 : 0.93;
                        cleanPct = weekNum >= 55 ? 0.87 : 0.82;
                        benchSets = mainSets; benchReps = mainReps;
                    } else {
                        // mesoIndex 8 (Job Transition) & 9 (Strength-Power) — Phase A/B only
                        const isAerobicMaint = mesoIndex === 8;
                        mainReps = isDeload ? "3" : isAerobicMaint ? "3-5" : "2-3";
                        mainSets = isDeload ? 3 : isAerobicMaint ? 3 : 4;
                        auxReps = isAerobicMaint ? "6-8" : "4-6"; auxSets = 3;
                        squatPct = isDeload ? 0.78 : isAerobicMaint ? (0.72 + weekInBlock * 0.02) : (0.85 + weekInBlock * 0.02);
                        benchPct = isDeload ? 0.75 : isAerobicMaint ? (0.70 + weekInBlock * 0.02) : (0.82 + weekInBlock * 0.02);
                        trapPct  = isDeload ? 0.80 : isAerobicMaint ? (0.75 + weekInBlock * 0.02) : (0.87 + weekInBlock * 0.02);
                        cleanPct = isAerobicMaint ? 0.68 : 0.75;
                        benchSets = mainSets;
                        benchReps = isDeload ? "4" : isAerobicMaint ? "5-6" : "3-4";
                    }

                    // Cap power clean at 87% — technique ceiling (Chris Pedulla / Tommy Moffitt principle)
                    cleanPct = Math.min(cleanPct, 0.87);

                    const squatWeight = Math.round((ONE_RM['Squat'] * squatPct * prog) / 5) * 5;
                    const benchWeight = Math.round((ONE_RM['Bench Press'] * benchPct * prog) / 5) * 5;
                    const trapWeight = Math.round((ONE_RM['Trap Bar Deadlift'] * trapPct * prog) / 5) * 5;
                    const cleanWeight = Math.round((ONE_RM['Power Clean'] * cleanPct * prog) / 5) * 5;

                    // Power clean: technique emphasis — more sets of fewer reps, separate from main sets
                    const cleanSets = mesoIndex <= 1 ? 3 : mesoIndex >= 10 ? 3 : mesoIndex >= 7 ? 5 : 4;
                    const cleanReps = mesoIndex <= 2 ? "3" : mesoIndex >= 7 ? "2" : "2-3";

                    // ── Accessory weights — periodized to match main lift phase ─────────────

                    // RFESS: 28-52% of squat 1RM (unilateral, DB in each hand)
                    const rfessPct = mesoIndex === 0 ? 0.28 : mesoIndex === 1 ? 0.32 :
                                     mesoIndex === 2 ? 0.38 : mesoIndex === 5 ? 0.42 :
                                     mesoIndex === 3 ? 0.45 : mesoIndex === 6 ? 0.50 :
                                     mesoIndex === 4 ? 0.48 : mesoIndex === 7 ? 0.52 :
                                     mesoIndex >= 10 ? 0.40 : 0.46;

                    // Pallof Press: anti-rotation core
