                        const match = savedExercises.find(s => s.name === freshEx.name);
                        return match ? {...freshEx, completed: match.completed} : freshEx;
                    });
                };

                const migratePlyoSprint = (savedData) => {
                    if (!savedData || !savedData.weeks) return savedData;
                    savedData.weeks.forEach((week, weekIdx) => {
                        const mesoIndex = Math.floor(weekIdx / 4);
                        const weekInBlock = weekIdx % 4;
                        const isDeload = weekInBlock === 3 && mesoIndex > 0;
                        const isRecovery = mesoIndex === 0 && weekInBlock < 2;
                        const volume = volumeData[weekIdx] || 5;

                        // Generate completely fresh sessions for this week/phase
                        const freshSessions = generateSessions(week.weekNum, mesoIndex, volume, isDeload, weekInBlock, isRecovery);

                        // ═══ PHASE C (weeks 27+): full 7-session rebuild — no 5K overlay ═══
                        if (week.weekNum >= 27) {
                            week.sessions = freshSessions.map((fresh, i) => ({
                                ...fresh,
                                exercises: mergeCompletionState(fresh.exercises, week.sessions[i]?.exercises || [])
                            }));
                            return;
                        }

                        // --- Monday (index 0): Squat Day + Hamstring + Plyos ---
                        if (week.sessions[0]) {
                            const oldExercises = week.sessions[0].exercises || [];
                            week.sessions[0] = {
                                ...freshSessions[0],
                                exercises: mergeCompletionState(freshSessions[0].exercises, oldExercises)
                            };
                        }

                        // --- Tuesday (index 1): Periodized running (unless 5K overlay) ---
                        const isFiveKWeek = fiveKOverlay[week.weekNum];
                        if (!isFiveKWeek && week.sessions[1]) {
                            const oldExercises = week.sessions[1].exercises || [];
                            week.sessions[1] = {
                                ...freshSessions[1],
                                exercises: mergeCompletionState(freshSessions[1].exercises, oldExercises)
                            };
                        }

                        // --- Wednesday (index 2): Upper Body + Shoulders ---
                        if (week.sessions[2]) {
                            const oldExercises = week.sessions[2].exercises || [];
                            week.sessions[2] = {
                                ...freshSessions[2],
                                exercises: mergeCompletionState(freshSessions[2].exercises, oldExercises)
                            };
                        }

                        // --- Thursday (index 3): Easy run (unless 5K overlay) ---
                        if (!isFiveKWeek && week.sessions[3]) {
                            const oldExercises = week.sessions[3].exercises || [];
                            week.sessions[3] = {
                                ...freshSessions[3],
                                exercises: mergeCompletionState(freshSessions[3].exercises, oldExercises)
                            };
                        }

                        // --- Friday (index 4): Hinge Day + Volume ---
                        if (week.sessions[4]) {
                            const oldExercises = week.sessions[4].exercises || [];
                            week.sessions[4] = {
                                ...freshSessions[4],
                                exercises: mergeCompletionState(freshSessions[4].exercises, oldExercises)
                            };
                        }

                        // --- Saturday (index 5): only replace if NOT a 5K overlay week ---
                        if (!isFiveKWeek) {
                            const satName = mesoIndex === 0 ? "Active Recovery" :
                                mesoIndex === 1 ? "Sprint Mechanics (Dan Pfaff)" :
                                mesoIndex <= 3 ? "Acceleration Development" :
                                mesoIndex <= 5 ? "Speed-Strength Sprints" :
                                mesoIndex <= 7 ? "40yd Dash Training" :
                                mesoIndex === 9 ? "Complex Sprint (PAP)" :
                                mesoIndex >= 10 ? "⚡ Peak Sprint — Sub-5.0 Prep" : "Sprint Work";
                            const satNotes = mesoIndex >= 7 ? "⚡ Sub-5.0 40yd Dash — TIME every rep · 4-5min full CNS recovery between" :
                                mesoIndex >= 4 ? "Speed-strength — reactive starts + acceleration" :
                                "Sprint mechanics — Dan Pfaff / Derek Hansen principles";
                            week.sessions[5] = {
                                name: satName,
                                day: "Saturday",
                                exercises: getSprintExercises(mesoIndex, isDeload, weekInBlock),
                                notes: satNotes
                            };
                        }
                    });
                    savedData.lastUpdated = Date.now();
                    return savedData;
                };

                // ── Force-fix goals: remove Half Marathon/Mile Time, migrate old targets, ensure 5K + 40yd ─────────
                const migrateGoals = (savedData) => {
                    if (!savedData || !savedData.goals) return savedData;
                    // Remove Half Marathon and Mile Time
                    savedData.goals = savedData.goals.filter(g => g.name !== "Half Marathon" && g.name !== "Mile Time");

                    // Migrate Trap Bar DL target: 405 → 450 (for any saved data still on old target)
                    const trapBar = savedData.goals.find(g => g.name === "Trap Bar DL");
                    if (trapBar && trapBar.target === 405) trapBar.target = 450;

                    // Migrate Bench Press target: 255 → 275
                    const bench = savedData.goals.find(g => g.name === "Bench Press");
                    if (bench && bench.target === 255) bench.target = 275;

                    // Migrate 30yd Dash → 40yd Dash (rename + new target/current)
                    const dashIdx = savedData.goals.findIndex(g => g.name === "30yd Dash");
                    if (dashIdx !== -1) {
                        savedData.goals[dashIdx] = {
                            name: "40yd Dash", target: 5.0, current: 5.3, unit: "sec",
                            icon: "SP", higherIsBetter: false
                        };
                    }

                    // Ensure 40yd Dash goal exists (add if missing)
                    const has40yd = savedData.goals.some(g => g.name === "40yd Dash");
                    if (!has40yd) {
                        savedData.goals.push({
                            name: "40yd Dash", target: 5.0, current: 5.3, unit: "sec",
                            icon: "SP", higherIsBetter: false
                        });
                    }

                    // Add 5K Race if missing
                    const has5K = savedData.goals.some(g => g.name === "5K Race");
                    if (!has5K) {
                        savedData.goals.unshift({name: "5K Race", target: 21, current: 23, unit: "min", icon: "5K", higherIsBetter: false, targetText: "Sub-21:00 (Apr 30)"});
                    }
                    return savedData;
                };

                // ── Force-apply 5K overlay sessions to any loaded data ────────────────────
                const migrate5KSessions = (savedData) => {
                    if (!savedData || !savedData.weeks) return savedData;
                    Object.keys(fiveKOverlay).forEach(weekNumStr => {
                        const weekNum = parseInt(weekNumStr);
                        const weekIdx = weekNum - 1;
                        if (!savedData.weeks[weekIdx]) return;
                        const ov = fiveKOverlay[weekNum];
                        const w = savedData.weeks[weekIdx];

                        w.has5KOverlay = true;
                        if (weekNum === 17) w.is5KRaceWeek = true;

                        // Tuesday (session index 1)
                        w.sessions[1] = {
                            name: "5K Prep Quality Run",
                            day: "Tuesday",
                            exercises: [{ name: ov.tue.name, sets: 1, reps: "1", weight: "", percent: "", completed: false, notes: ov.tue.notes, mileage: ov.tue.mileage, isRun: true }],
                            notes: "🏃 5K Prep — Apr 30 Race Goal: Sub-21:00 (1 speed session/week)"
                        };
                        // Thursday (session index 3)
                        w.sessions[3] = {
                            name: weekNum === 17 ? "🏁 5K RACE DAY — Thu Apr 30" : "Easy Recovery Run",
                            day: "Thursday",
                            exercises: [{ name: ov.thu.name, sets: 1, reps: "1", weight: "", percent: "", completed: false, notes: ov.thu.notes, mileage: ov.thu.mileage, isRun: true }],
                            notes: weekNum === 17 ? "🏁 RACE DAY — Thu Apr 30 — Sub-21:00!" : "Easy only — 8:30-9:00/mi, no pushing"
                        };
                        // Saturday NOT overridden — stays as plyos + sprint mechanics
                    });
                    savedData.lastUpdated = Date.now();
                    return savedData;
                };

                const migrateData = (savedData) => {
                    if (!savedData || !savedData.weeks) return savedData;
                    // Step 1: Add Daily Mile to lifting days if missing
                    const firstMonday = savedData.weeks[0]?.sessions[0]?.exercises;
                    const hasDailyMile = firstMonday?.some(ex => ex.name === "Daily Mile");
                    if (!hasDailyMile) {
                        console.log('Migrating data to add Daily Mile...');
                        savedData.weeks.forEach((week, weekIdx) => {
                            week.sessions.forEach((session, sessIdx) => {
                                if (sessIdx === 0 || sessIdx === 2 || sessIdx === 4) {
                                    if (!session.exercises.some(ex => ex.name === "Daily Mile")) {
                                        session.exercises.unshift({
                                            name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "",
                                            completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true
                                        });
                                    }
                                }
                                if (sessIdx === 5) {
                                    if (!session.exercises.some(ex => ex.name === "Daily Mile")) {
                                        session.exercises.unshift({
                                            name: "Daily Mile", sets: 1, reps: "1 mile", weight: "", percent: "",
                                            completed: false, notes: "Easy pace ~9min", mileage: 1, isRun: true
                                        });
                                    }
                                }
                                if (sessIdx === 1 || sessIdx === 3) {
                                    session.exercises.forEach(ex => {
                                        if (!ex.mileage) {
                                            const mesoIndex = Math.floor(weekIdx / 4);
                                            const isRecovery = weekIdx < 2;
                                            if (sessIdx === 1) {
                                                ex.mileage = mesoIndex === 0 ? (isRecovery ? 2 : 3) : mesoIndex <= 5 ? 4 : 5;
                                            } else {
                                                ex.mileage = mesoIndex === 0 ? (isRecovery ? 1.5 : 2.5) : mesoIndex <= 5 ? 3 : 4;
                                            }
                                            ex.isRun = true;
                                        }
                                    });
                                }
                            });
                        });
                    }
                    // Step 2: ALWAYS fix goals (remove Half Marathon, add 5K Race)
                    migrateGoals(savedData);
                    // Step 3: ALWAYS inject periodized plyos into Monday + sprint work into Saturday
                    migratePlyoSprint(savedData);
                    // Step 4: ALWAYS force-apply 5K overlay — guarantees weeks 7-16 are race-specific
                    return migrate5KSessions(savedData);
                };

                const getInitialData = () => {
                    const saved = localStorage.getItem('chaseTraining56Week2026');
                    if (saved) {
                        try {
                            const parsedData = JSON.parse(saved);
                            return migrateData(parsedData);
                        } catch (e) {
                            console.log('Regenerating...');
                        }
                    }
                    return getDefaultData();
                };

                function SyncIndicator({ status, lastSync }) {
                    const info = status === 'synced' ? { text: 'Synced', cls: 'sync-online' } :
                                 status === 'syncing' ? { text: 'Syncing...', cls: 'sync-syncing syncing-pulse' } :
                                 status === 'offline' ? { text: 'Offline', cls: 'sync-offline' } :
                                 { text: 'Error', cls: 'sync-offline' };
                    return (
                        <div className={`sync-indicator ${info.cls}`}>
                            <span>{info.text}</span>
                            {lastSync && status === 'synced' && <span className="text-xs opacity-75">{new Date(lastSync).toLocaleTimeString()}</span>}
                        </div>
                    );
                }

                function App() {
                    const [data, setData] = useState(getInitialData);
                    const [currentWeek, setCurrentWeek] = useState(data.currentWeekIndex || 0);
                    const [currentSession, setCurrentSession] = useState(0);
                    const [isEditMode, setIsEditMode] = useState(false);
                    const [isEditingGoals, setIsEditingGoals] = useState(false);
                    const [view, setView] = useState('overview');
                    const [syncStatus, setSyncStatus] = useState('syncing');
                    const [lastSync, setLastSync] = useState(null);
                    const [isOnline, setIsOnline] = useState(navigator.onLine);
                    // 1RM Calculator state
                    const [calcLift, setCalcLift] = useState('Squat');
                    const [calcWeight, setCalcWeight] = useState('');
                    const [calcReps, setCalcReps] = useState('');
                    const [calcResult, setCalcResult] = useState(null);
                    const chartRef = useRef(null);
                    const chartInstance = useRef(null);
                    const macroChartRef = useRef(null);
                    const macroChartInstance = useRef(null);
                    const syncTimeoutRef = useRef(null);
                    const isInitialLoad = useRef(true);
                    const lastRemoteUpdate = useRef(0);
                    const isSaving = useRef(false);
                    const localDataVersion = useRef(0);

                    const saveToFirebase = useCallback((newData) => {
                        if (syncTimeoutRef.current) clearTimeout(syncTimeoutRef.current);
                        setSyncStatus('syncing');
                        // Debounce 1.5s — wait for rapid edits to settle before pushing
                        syncTimeoutRef.current = setTimeout(() => {
                            const dataToSave = { ...newData, lastUpdated: Date.now() };
                            dataRef.set(dataToSave)
                                .then(() => {
                                    lastRemoteUpdate.current = dataToSave.lastUpdated;
                                    setSyncStatus('synced');
                                    setLastSync(Date.now());
                                })
                                .catch(() => setSyncStatus('error'));
                        }, 1500);
                    }, []);

                    useEffect(() => {
                        const handleOnline = () => { setIsOnline(true); };
                        const handleOffline = () => { setIsOnline(false); setSyncStatus('offline'); };
                        window.addEventListener('online', handleOnline);
                        window.addEventListener('offline', handleOffline);

                        // Load once from Firebase on startup — no real-time listener (prevents sync loops)
                        // Cross-device sync works by: phone saves → computer sees it on next open/refresh
                        dataRef.once('value').then((snapshot) => {
                            const remoteData = snapshot.val();
                            if (remoteData && remoteData.lastUpdated) {
                                const localRaw = localStorage.getItem('chaseTraining56Week2026');
                                const localData = localRaw ? JSON.parse(localRaw) : null;
                                const localTs = localData?.lastUpdated || 0;
                                if (remoteData.lastUpdated > localTs) {
                                    // Remote is newer — apply it
                                    const migratedData = migrateData(remoteData);
                                    lastRemoteUpdate.current = remoteData.lastUpdated;
                                    setData(migratedData);
                                    setCurrentWeek(migratedData.currentWeekIndex || 0);
                                    localStorage.setItem('chaseTraining56Week2026', JSON.stringify(migratedData));
                                    setLastSync(remoteData.lastUpdated);
                                }
                            }
                            setSyncStatus('synced');
                            // Allow auto-save only AFTER initial load is fully done
                            setTimeout(() => { isInitialLoad.current = false; }, 500);
                        }).catch(() => {
                            setSyncStatus('offline');
                            setTimeout(() => { isInitialLoad.current = false; }, 500);
                        });

                        return () => {
                            window.removeEventListener('online', handleOnline);
                            window.removeEventListener('offline', handleOffline);
                            if (syncTimeoutRef.current) clearTimeout(syncTimeoutRef.current);
                        };
                    }, []);

                    useEffect(() => {
                        if (isInitialLoad.current) return; // don't save during initial load
                        const newData = {...data, currentWeekIndex: currentWeek};
                        localStorage.setItem('chaseTraining56Week2026', JSON.stringify(newData));
                        saveToFirebase(newData); // debounced 1.5s push to Firebase
                    }, [data, currentWeek]);

                    useEffect(() => {
                        if (view === 'goals' && chartRef.current && window.Chart) {
                            if (chartInstance.current) chartInstance.current.destroy();
                            chartInstance.current = new Chart(chartRef.current.getContext('2d'), {
                                type: 'bar',
                                data: {
                                    labels: data.goals.map(g => g.name),
                                    datasets: [
                                        { label: 'Current', data: data.goals.map(g => g.current), backgroundColor: 'rgba(99, 102, 241, 0.7)' },
                                        { label: 'Target', data: data.goals.map(g => g.target), backgroundColor: 'rgba(34, 197, 94, 0.7)' }
                                    ]
                                },
                                options: { responsive: true, scales: { y: { beginAtZero: true } } }
                            });
                        }
                        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
                    }, [view, data.goals]);

                    useEffect(() => {
                        if (view === 'overview' && macroChartRef.current && window.Chart) {
                            if (macroChartInstance.current) macroChartInstance.current.destroy();
                            macroChartInstance.current = new Chart(macroChartRef.current.getContext('2d'), {
                                type: 'line',
                                data: {
                                    labels: Array.from({length: TOTAL_WEEKS}, (_, i) => `W${i+1}`),
                                    datasets: [
                                        { label: 'Volume', data: volumeData, borderColor: 'rgba(59, 130, 246, 1)', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.2)', tension: 0.4 },
                                        { label: 'Intensity', data: intensityData, borderColor: 'rgba(239, 68, 68, 1)', fill: true, backgroundColor: 'rgba(239, 68, 68, 0.2)', tension: 0.4 }
                                    ]
                                },
                                options: { responsive: true, scales: { y: { min: 0, max: 11 } } }
                            });
                        }
                        return () => { if (macroChartInstance.current) macroChartInstance.current.destroy(); };
                    }, [view, currentWeek]);

                    const getProgress = (goal) => goal.higherIsBetter ? Math.min((goal.current / goal.target) * 100, 100) : Math.min((goal.target / goal.current) * 100, 100);
                    const getProgressColor = (p) => p >= 90 ? 'bg-green-500' : p >= 70 ? 'bg-yellow-500' : 'bg-red-500';
                    const updateGoal = (index, field, value) => { const newData = {...data}; newData.goals[index][field] = parseFloat(value) || 0; setData(newData); };
                    const updateGoalTarget = (index, value) => {
                        const newData = {...data};
                        newData.goals[index].target = parseFloat(value) || 0;
                        setData(newData);
                    };
                    const toggleExerciseComplete = (exerciseIndex) => {
                        const newData = {...data};
                        newData.weeks[currentWeek].sessions[currentSession].exercises[exerciseIndex].completed = !newData.weeks[currentWeek].sessions[currentSession].exercises[exerciseIndex].completed;
                        setData(newData);
                    };
                    const updateExercise = (exerciseIndex, field, value) => { const newData = {...data}; newData.weeks[currentWeek].sessions[currentSession].exercises[exerciseIndex][field] = value; setData(newData); };
                    const addExercise = () => { const newData = {...data}; newData.weeks[currentWeek].sessions[currentSession].exercises.push({name: "New Exercise", sets: 3, reps: "10", weight: "100", percent: "", completed: false, notes: ""}); setData(newData); };
                    const deleteExercise = (idx) => { const newData = {...data}; newData.weeks[currentWeek].sessions[currentSession].exercises.splice(idx, 1); setData(newData); };
                    const getSessionCompletion = () => { if (!data.weeks[currentWeek]) return 0; const s = data.weeks[currentWeek].sessions[currentSession]; return Math.round((s.exercises.filter(e => e.completed).length / s.exercises.length) * 100); };
                    const resetData = () => { if (confirm('Reset all progress on all devices?')) { localStorage.removeItem('chaseTraining56Week2026'); dataRef.set(getDefaultData()).then(() => window.location.reload()); } };
                    const forceSync = () => { setSyncStatus('syncing'); dataRef.set({...data, currentWeekIndex: currentWeek, lastUpdated: Date.now()}).then(() => { setSyncStatus('synced'); setLastSync(Date.now()); }).catch(() => setSyncStatus('error')); };

                    const calcSessionVolume = (session) => {
                        return session.exercises.reduce((total, ex) => {
                            if (ex.completed && !ex.isRun && ex.weight && ex.weight !== 'BW' && ex.weight !== '') {
                                const w = parseFloat(ex.weight) || 0;
                                const s = parseInt(ex.sets) || 0;
                                const r = parseInt(ex.reps) || 0;
                                return total + (w * s * r);
                            }
                            return total;
                        }, 0);
                    };
                    const calcWeekVolume = (weekIdx) => {
                        if (!data.weeks[weekIdx]) return 0;
                        return data.weeks[weekIdx].sessions.reduce((total, sess) => total + calcSessionVolume(sess), 0);
                    };
                    const calcTotalVolume = () => data.weeks.reduce((total, _, idx) => total + calcWeekVolume(idx), 0);
                    const currentSessionVolume = data.weeks[currentWeek] ? calcSessionVolume(data.weeks[currentWeek].sessions[currentSession]) : 0;
                    const currentWeekVolume = calcWeekVolume(currentWeek);
                    const totalVolume = calcTotalVolume();

                    const calcSessionMileage = (session) => {
                        return session.exercises.reduce((total, ex) => {
                            if (ex.completed && ex.mileage) return total + ex.mileage;
                            return total;
                        }, 0);
                    };
                    const calcWeekMileage = (weekIdx) => {
                        if (!data.weeks[weekIdx]) return 0;
                        return data.weeks[weekIdx].sessions.reduce((total, sess) => total + calcSessionMileage(sess), 0);
                    };
                    const calcTotalMileage = () => data.weeks.reduce((total, _, idx) => total + calcWeekMileage(idx), 0);
                    const currentWeekMileage = calcWeekMileage(currentWeek);
                    const totalMileage = calcTotalMileage();
                    const weeksWithMileage = data.weeks.filter((_, idx) => calcWeekMileage(idx) > 0).length;
                    const avgWeeklyMileage = weeksWithMileage > 0 ? (totalMileage / weeksWithMileage).toFixed(1) : 0;

                    // ── CONTACT TRACKING (Plyo v2) ──────────────────────────────────────────
                    const calcSessionContacts = (session) => {
                        return session.exercises.reduce((total, ex) => total + (ex.contacts || 0), 0);
                    };
                    const calcWeekContacts = (weekIdx) => {
                        if (!data.weeks[weekIdx]) return 0;
                        return data.weeks[weekIdx].sessions.reduce((total, sess) => total + calcSessionContacts(sess), 0);
                    };
                    const currentSessionContacts = data.weeks[currentWeek] ? calcSessionContacts(data.weeks[currentWeek].sessions[currentSession]) : 0;
                    const currentWeekContacts = calcWeekContacts(currentWeek);
                    // Phase contacts: sum all weeks in same mesocycle
                    const currentMesoIndex = Math.floor(currentWeek / 4);
                    const phaseStartWeek = currentMesoIndex * 4;
                    const phaseEndWeek = Math.min(phaseStartWeek + 4, data.weeks.length);
                    let phaseContacts = 0;
                    for (let i = phaseStartWeek; i < phaseEndWeek; i++) phaseContacts += calcWeekContacts(i);
                    const plyoPhaseLabel = currentMesoIndex <= 2 ? "A·Foundation" : currentMesoIndex <= 5 ? "B·Development" : currentMesoIndex <= 9 ? "C·Intensification" : "D·Realization";

                    if (!data.weeks || !data.weeks[currentWeek]) {
                        return (<div className="min-h-screen p-8 flex items-center justify-center"><SyncIndicator status={syncStatus} lastSync={lastSync} />
                            <div className="glass rounded-2xl shadow-2xl p-8 text-center">
                                <h2 className="text-2xl font-bold text-red-600 mb-4">Data Error</h2>
                                <button onClick={resetData} className="px-6 py-3 rounded-lg font-semibold text-white hover:opacity-90" style={{background:'#005F87'}}>Reset & Load</button>
                            </div>
                        </div>);
                    }

                    const week = data.weeks[currentWeek];
                    const session = week.sessions[currentSession];
                    const completion = getSessionCompletion();

                    // 5K Race countdown
                    const raceDate = new Date('2026-04-30');
                    const today = new Date();
                    const daysToRace = Math.max(0, Math.ceil((raceDate - today) / (1000 * 60 * 60 * 24)));

                    // Max Out countdown — Week 53 starts Dec 31 2026 (Testing & Realization block)
                    const maxOutDate = new Date('2026-12-31');
                    const daysToMaxOut = Math.max(0, Math.ceil((maxOutDate - today) / (1000 * 60 * 60 * 24)));

                    return (
                        <div className="min-h-screen p-4 md:p-8">
                            <SyncIndicator status={syncStatus} lastSync={lastSync} />
                            <div className="max-w-7xl mx-auto">
                                <div className="glass rounded-2xl shadow-2xl p-6 md:p-8 mb-6 animate-slide-in">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h1 className="text-4xl md:text-5xl font-bold text-gray-800 mb-2">Chase's 56-Week Training</h1>
                                            <p className="text-gray-600 text-lg">Week {currentWeek + 1} of {TOTAL_WEEKS} — {week.phase}</p>
                                            <p className="text-gray-500 text-sm mt-1">📅 {getWeekLabel(week.weekNum)}</p>
                                            <p className="text-sm font-semibold mt-2" style={{color:'#005F87'}}>4 Weeks Recovery + 52 Weeks Concurrent Training</p>
                                        </div>
                                        <div className="flex flex-col items-end gap-2">
                                            <button onClick={forceSync} className="px-4 py-2 text-white rounded-lg text-sm font-semibold btn-primary" style={{background:'#005F87'}}>Sync</button>
                                            {daysToRace <= 75 && (
                                                <div className="text-white px-4 py-2 rounded-lg text-sm font-bold text-right" style={{background:'#005F87', borderLeft:'3px solid #00A3A3'}}>
                                                    🏁 5K Race in {daysToRace} days<br/>
                                                    <span className="text-xs opacity-90">Apr 30 · Sub-21:00</span>
                                                </div>
                                            )}
                                            {daysToMaxOut > 0 && (
                                                <div className="bg-gradient-to-r from-blue-800 to-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold text-right">
                                                    💪 Max Out in {daysToMaxOut} days<br/>
                                                    <span className="text-xs opacity-90">Dec 31 · Testing & Realization</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="glass rounded-xl shadow-lg p-4 mb-6 flex flex-wrap gap-3">
                                    {['overview', 'goals', 'volume', 'mileage', 'workout', '1rm'].map(v => (
                                        <button key={v} onClick={() => setView(v)} className={`px-6 py-3 rounded-lg font-semibold transition-all ${view === v ? 'bg-blue-700 text-white shadow-lg' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>
                                            {v === '1rm' ? '1RM Calc' : v.charAt(0).toUpperCase() + v.slice(1)}

                                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg">
                                                        {data.weeks.map((w, i) => (<option key={i} value={i}>W{w.weekNum} ({getWeekLabel(w.weekNum)}): {w.phase}{w.isDeload ? ' — Deload' : ''}{w.is5KRaceWeek ? ' 🏁 RACE WEEK' : ''}</option>))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Session</label>
                                                    <select value={currentSession} onChange={(e) => setCurrentSession(parseInt(e.target.value))}
                                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg">
                                                        {week.sessions.map((s, i) => (<option key={i} value={i}>{s.day}: {s.name}</option>))}
                                                    </select>
                                                </div>
                                            </div>
                                            {fiveKOverlay[week.weekNum] && (
                                                <div className="mb-4 p-3 bg-orange-50 border-2 border-orange-300 rounded-lg">
                                                    <p className="text-sm font-bold font-bold" style={{color:'#005F87', fontFamily:'Arial,sans-serif'}}>🏃 5K Prep Week — Running sessions modified for Apr 30 race · Strength stays unchanged</p>
                                                </div>
                                            )}
                                            {E1RM_CHECK_WEEKS[week.weekNum] && (
                                                <div className="mb-4 p-3 border-2 rounded-lg" style={{background:'rgba(5,150,105,0.08)', borderColor:'#059669'}}>
                                                    <p className="text-sm font-bold" style={{color:'#064E3B', fontFamily:'Arial,sans-serif'}}>💪 e1RM CHECK-IN WEEK — Lift(s): {E1RM_CHECK_WEEKS[week.weekNum].join(' · ')}</p>
                                                    <p className="text-xs mt-1" style={{color:'#065F46'}}>Last working set = AMRAP (reps to technical failure). Log the result, then open the 1RM Calc tab to update your estimated max. Never AMRAP above 6 reps — if your prescribed weight allows more than that, add weight instead.</p>
                                                </div>
                                            )}
                                            {E1RM_PRIMER_WEEKS.includes(week.weekNum) && (
                                                <div className="mb-4 p-3 border-2 rounded-lg" style={{background:'rgba(217,119,6,0.08)', borderColor:'#D97706'}}>
                                                    <p className="text-sm font-bold" style={{color:'#78350F', fontFamily:'Arial,sans-serif'}}>🎯 PRIMER WEEK — Week 50 (5 weeks out from Week 55 max test)</p>
                                                    <p className="text-xs mt-1" style={{color:'#92400E'}}>Take 1 single at 87-93% on Squat, Bench, and Trap Bar DL this week. This is NOT an AMRAP — it's a rehearsal. Rate readiness on each attempt and use that feel to calibrate the Week 55 max attempts.</p>
                                                </div>
                                            )}
                                            {session.isPlyoTestDay && (
                                                <div className="mb-4 p-3 border-2 rounded-lg" style={{background:'rgba(0,163,163,0.08)', borderColor:'#00A3A3'}}>
                                                    <p className="text-sm font-bold" style={{color:'#005F87', fontFamily:'Arial,sans-serif'}}>📊 PLYO TEST DAY — Record CMJ height · Compare to previous tests · Track RSI & GCT</p>
                                                </div>
                                            )}
                                            {session.exercises.some(e => e.isPlyoTest) && !session.isPlyoTestDay && (
                                                <div className="mb-4 p-3 border-2 rounded-lg" style={{background:'rgba(0,163,163,0.08)', borderColor:'#00A3A3'}}>
                                                    <p className="text-sm font-bold" style={{color:'#005F87', fontFamily:'Arial,sans-serif'}}>📊 CMJ TEST — Record height for this session</p>
                                                </div>
                                            )}
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-3">
                                                <div className="bg-blue-50 rounded-lg p-4"><p className="text-xs text-gray-600">Completion</p><p className="text-2xl font-bold text-blue-700" style={{color:'#005F87'}}>{completion}%</p></div>
                                                <div className="bg-blue-50 rounded-lg p-4"><p className="text-xs text-gray-600">Session Vol</p><p className="text-2xl font-bold text-blue-600">{(currentSessionVolume/1000).toFixed(1)}k</p></div>
                                                <div className="bg-green-50 rounded-lg p-4"><p className="text-xs text-gray-600">Week Vol</p><p className="text-2xl font-bold text-green-600">{(currentWeekVolume/1000).toFixed(1)}k</p></div>
                                                <div className="bg-orange-50 rounded-lg p-4"><p className="text-xs text-gray-600">Intensity</p><p className="text-2xl font-bold font-semibold" style={{color:'#005F87'}}>{week.intensity}/10</p></div>
                                            </div>
                                            {currentSessionContacts > 0 && (
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div className="rounded-lg p-3" style={{background:'rgba(0,163,163,0.08)'}}><p className="text-xs" style={{color:'#565A5C'}}>Session Contacts</p><p className="text-xl font-bold" style={{color:'#00A3A3'}}>{currentSessionContacts}</p></div>
                                                    <div className="rounded-lg p-3" style={{background:'rgba(0,163,163,0.08)'}}><p className="text-xs" style={{color:'#565A5C'}}>Week Contacts</p><p className="text-xl font-bold" style={{color:'#00A3A3'}}>{currentWeekContacts}</p></div>
                                                    <div className="rounded-lg p-3" style={{background:'rgba(0,163,163,0.08)'}}><p className="text-xs" style={{color:'#565A5C'}}>Phase ({plyoPhaseLabel})</p><p className="text-xl font-bold" style={{color:'#00A3A3'}}>{phaseContacts}</p></div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="glass rounded-xl shadow-lg overflow-hidden">
                                            <div className={`p-6 ${week.is5KRaceWeek ? 'bg-gradient-to-r from-orange-500 to-red-500' : week.isRecovery ? 'bg-gradient-to-r from-green-500 to-emerald-600' : week.isDeload ? 'bg-gradient-to-r from-yellow-500 to-orange-500' : week.isTestWeek ? 'bg-gradient-to-r from-red-500 to-pink-600' : 'bg-gradient-to-r from-purple-600 to-blue-600'} text-white`}>
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <h2 className="text-3xl font-bold">{session.name}</h2>
                                                        <p className="opacity-90">{session.day} {getSessionDate(week.weekNum, DAY_OFFSETS[session.day] ?? 0)} — {session.notes}</p>
                                                    </div>
                                                    {isEditMode && <button onClick={addExercise} className="px-4 py-2 bg-white rounded-lg font-semibold" style={{color:'#005F87'}}>+ Add</button>}
                                                </div>
                                            </div>
                                            <div className="p-6 overflow-x-auto">
                                                <table className="w-full">
                                                    <thead><tr className="border-b-2 border-gray-200">
                                                        <th className="px-4 py-3 text-left">Done</th><th className="px-4 py-3 text-left">Exercise</th>
                                                        <th className="px-4 py-3 text-center">Sets</th><th className="px-4 py-3 text-center">Reps</th>
                                                        <th className="px-4 py-3 text-center">Weight</th><th className="px-4 py-3 text-center">%1RM / <span style={{color:'#00A3A3'}}>Contacts</span></th>
                                                        <th className="px-4 py-3 text-left">Notes</th>{isEditMode && <th className="px-4 py-3">Del</th>}
                                                    </tr></thead>
                                                    <tbody>
                                                        {session.exercises.map((ex, idx) => (
                                                            <tr key={idx} className={`border-b border-gray-200 exercise-row ${ex.completed ? 'completed' : ''}`} style={ex.isPlyoTest ? {background:'rgba(0,163,163,0.10)'} : ex.isPlyo ? {background:'rgba(0,163,163,0.04)'} : {}}>
                                                                <td className="px-4 py-3"><input type="checkbox" checked={ex.completed} onChange={() => toggleExerciseComplete(idx)} className="w-5 h-5"/></td>
                                                                <td className="px-4 py-3">{isEditMode ? <input type="text" value={ex.name} onChange={(e) => updateExercise(idx, 'name', e.target.value)} className="w-full px-2 py-1 border rounded"/> : <span className="font-semibold exercise-name">{ex.isPlyo && <span className="inline-block w-2 h-2 rounded-full mr-2" style={{background:'#00A3A3'}}></span>}{ex.name}{ex.isPlyoTest && <span className="ml-2 px-2 py-0.5 rounded text-xs font-bold text-white" style={{background:'#00A3A3'}}>TEST</span>}</span>}</td>
                                                                <td className="px-4 py-3 text-center">{isEditMode ? <input type="number" value={ex.sets} onChange={(e) => updateExercise(idx, 'sets', e.target.value)} className="w-16 px-2 py-1 border rounded text-center"/> : <span className="font-semibold">{ex.sets}</span>}</td>
                                                                <td className="px-4 py-3 text-center">{isEditMode ? <input type="text" value={ex.reps} onChange={(e) => updateExercise(idx, 'reps', e.target.value)} className="w-20 px-2 py-1 border rounded text-center"/> : <span>{ex.reps}</span>}</td>
                                                                <td className="px-4 py-3 text-center">{isEditMode ? <input type="text" value={ex.weight || ''} onChange={(e) => updateExercise(idx, 'weight', e.target.value)} className="w-24 px-2 py-1 border rounded text-center"/> : <span className="font-medium">{ex.weight || '-'} {ex.weight && ex.weight !== 'BW' && 'lbs'}</span>}</td>
                                                                <td className="px-4 py-3 text-center">{ex.contacts ? <span className="px-2 py-1 rounded font-semibold text-xs" style={{background:'rgba(0,163,163,0.15)', color:'#00A3A3'}}>{ex.contacts}</span> : <span className={ex.percent ? 'bg-orange-100 text-orange-700 px-2 py-1 rounded font-semibold' : ''}>{ex.percent || '-'}</span>}</td>
                                                                <td className="px-4 py-3 text-xs text-gray-600">{ex.notes}{ex.mileage && <span className="ml-2 px-2 py-1 bg-blue-100 text-blue-700 rounded font-semibold">{ex.mileage} mi</span>}</td>
                                                                {isEditMode && <td className="px-4 py-3"><button onClick={() => deleteExercise(idx)} className="px-3 py-1 bg-red-500 text-white rounded">X</button></td>}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                        {isEditMode && (
                                            <button onClick={resetData} className="w-full glass rounded-xl shadow-lg p-6 hover:shadow-2xl bg-red-50">
                                                <h3 className="text-xl font-bold text-red-600">Reset Program</h3>
                                                <p className="text-sm text-gray-600 mt-2">Deletes all progress on all devices</p>
                                            </button>
                                        )}
                                    </div>
                                )}

                                {view === '1rm' && (
                                    <div className="space-y-6">
                                        <div className="glass rounded-xl shadow-lg p-6">
                                            <h2 className="text-2xl font-bold mb-2" style={{color:'#005F87', fontFamily:'Arial,sans-serif'}}>1RM Calculator</h2>
                                            <p className="text-sm mb-6" style={{color:'#565A5C'}}>Enter a weight × reps you completed. Estimates your 1-rep max using Epley & Brzycki formulas.</p>

                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Lift</label>
                                                    <select value={calcLift} onChange={(e) => setCalcLift(e.target.value)}
                                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg font-semibold">
                                                        {Object.keys(data.oneRepMaxes || ONE_RM).map(lift => (
                                                            <option key={lift} value={lift}>{lift}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Weight (lbs)</label>
                                                    <input type="number" value={calcWeight} onChange={(e) => setCalcWeight(e.target.value)}
                                                        placeholder="e.g. 225" className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg font-semibold text-center"/>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Reps Completed</label>
                                                    <input type="number" value={calcReps} onChange={(e) => setCalcReps(e.target.value)}
                                                        placeholder="e.g. 5" min="1" max="30" className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg font-semibold text-center"/>
                                                </div>
                                            </div>

                                            <button onClick={() => {
                                                const w = parseFloat(calcWeight); const r = parseInt(calcReps);
                                                if (!w || !r || r < 1) { setCalcResult(null); return; }
                                                if (r === 1) { setCalcResult({epley: w, brzycki: w, avg: w, reps: r, weight: w}); return; }
                                                const epley = Math.round(w * (1 + r / 30));
                                                const brzycki = Math.round(w * (36 / (37 - r)));
                                                const avg = Math.round((epley + brzycki) / 2);
                                                setCalcResult({epley, brzycki, avg, reps: r, weight: w});
                                            }} className="w-full py-3 rounded-lg text-white font-bold text-lg mb-4" style={{background:'#005F87'}}>
                                                Calculate 1RM
                                            </button>

                                            {calcResult && (
                                                <div className="space-y-4">
                                                    <div className="grid grid-cols-3 gap-4">
                                                        <div className="rounded-lg p-4 text-center" style={{background:'rgba(0,95,135,0.08)'}}>
                                                            <p className="text-xs font-semibold" style={{color:'#565A5C'}}>Epley Formula</p>
                                                            <p className="text-3xl font-bold" style={{color:'#005F87'}}>{calcResult.epley}</p>
                                                            <p className="text-xs" style={{color:'#565A5C'}}>lbs</p>
                                                        </div>
                                                        <div className="rounded-lg p-4 text-center" style={{background:'rgba(0,163,163,0.08)'}}>
                                                            <p className="text-xs font-semibold" style={{color:'#565A5C'}}>Brzycki Formula</p>
                                                            <p className="text-3xl font-bold" style={{color:'#00A3A3'}}>{calcResult.brzycki}</p>
                                                            <p className="text-xs" style={{color:'#565A5C'}}>lbs</p>
                                                        </div>
                                                        <div className="rounded-lg p-4 text-center border-2" style={{background:'rgba(0,95,135,0.12)', borderColor:'#005F87'}}>
                                                            <p className="text-xs font-semibold" style={{color:'#565A5C'}}>Average (Recommended)</p>
                                                            <p className="text-3xl font-bold" style={{color:'#005F87'}}>{calcResult.avg}</p>
                                                            <p className="text-xs" style={{color:'#565A5C'}}>lbs</p>
                                                        </div>
                                                    </div>

                                                    <div className="rounded-lg p-4" style={{background:'rgba(0,95,135,0.05)'}}>
                                                        <p className="text-sm font-semibold mb-2" style={{color:'#005F87'}}>Percentage Chart (based on {calcResult.avg} lbs)</p>
                                                        <div className="grid grid-cols-5 gap-2 text-center text-sm">
                                                            {[100,95,90,85,80,75,70,65,60,50].map(pct => (
                                                                <div key={pct} className="rounded p-2" style={{background: pct >= 90 ? 'rgba(239,68,68,0.1)' : pct >= 75 ? 'rgba(251,191,36,0.1)' : 'rgba(0,163,163,0.1)'}}>
                                                                    <p className="font-bold text-xs" style={{color:'#565A5C'}}>{pct}%</p>
                                                                    <p className="font-bold" style={{color:'#005F87'}}>{Math.round(calcResult.avg * pct / 100 / 5) * 5}</p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    {(() => {
                                                        const liftToGoalName = {'Squat':'Squat','Bench Press':'Bench Press','Trap Bar Deadlift':'Trap Bar DL','Power Clean':'Power Clean'};
                                                        const goalName = liftToGoalName[calcLift];
                                                        if (!goalName || !data.goals) return null;
                                                        const goal = data.goals.find(g => g.name === goalName);
                                                        if (!goal) return null;
                                                        const newPct = Math.min(Math.round((calcResult.avg / goal.target) * 100), 100);
                                                        const oldPct = Math.min(Math.round((goal.current / goal.target) * 100), 100);
                                                        const delta = newPct - oldPct;
                                                        return (
                                                            <div className="rounded-lg p-4 border-2" style={{background:'rgba(5,150,105,0.08)', borderColor:'#059669'}}>
                                                                <p className="text-sm font-bold mb-2" style={{color:'#064E3B'}}>🎯 Goals Tab Preview — {goalName}</p>
                                                                <div className="flex items-center gap-4">
                                                                    <div className="flex-1">
                                                                        <p className="text-xs" style={{color:'#565A5C'}}>Current → New</p>
                                                                        <p className="text-lg font-bold" style={{color:'#064E3B'}}>{goal.current} → {calcResult.avg} lbs</p>
                                                                    </div>
                                                                    <div className="flex-1">
                                                                        <p className="text-xs" style={{color:'#565A5C'}}>Progress toward {goal.target} lb goal</p>
                                                                        <p className="text-lg font-bold" style={{color:'#064E3B'}}>{oldPct}% → {newPct}% {delta !== 0 && <span style={{color: delta > 0 ? '#059669' : '#DC2626'}}>({delta > 0 ? '+' : ''}{delta}%)</span>}</p>
                                                                    </div>
                                                                </div>
                                                                <p className="text-xs mt-2" style={{color:'#065F46'}}>Clicking Update below will sync this new e1RM to the Goals tab automatically.</p>
                                                            </div>
                                                        );
                                                    })()}

                                                    <div className="flex gap-4">
                                                        <button onClick={() => {
                                                            const newData = {...data};
                                                            if (!newData.oneRepMaxes) newData.oneRepMaxes = {...ONE_RM};
                                                            const prev = newData.oneRepMaxes[calcLift];
                                                            newData.oneRepMaxes[calcLift] = calcResult.avg;

                                                            // ═══ SYNC TO GOALS TAB ═══════════════════════════════════
                                                            // 1RM Calc lift names → Goals tab names (Trap Bar naming differs)
                                                            const liftToGoalName = {
                                                                'Squat': 'Squat',
                                                                'Bench Press': 'Bench Press',
                                                                'Trap Bar Deadlift': 'Trap Bar DL',
                                                                'Power Clean': 'Power Clean'
                                                            };
                                                            const goalName = liftToGoalName[calcLift];
                                                            let goalSyncMsg = '';
                                                            if (goalName && newData.goals) {
                                                                const goalIdx = newData.goals.findIndex(g => g.name === goalName);
                                                                if (goalIdx !== -1) {
                                                                    const prevGoalCurrent = newData.goals[goalIdx].current;
                                                                    newData.goals[goalIdx].current = calcResult.avg;
                                                                    const target = newData.goals[goalIdx].target;
                                                                    const pctComplete = Math.round((calcResult.avg / target) * 100);
                                                                    goalSyncMsg = '\n\n✓ Goals tab updated: ' + goalName + ' ' + prevGoalCurrent + ' → ' + calcResult.avg + ' lbs (' + pctComplete + '% of ' + target + ' lb target)';
                                                                }
                                                            }

                                                            setData(newData);
                                                            alert(calcLift + ' 1RM updated: ' + prev + ' → ' + calcResult.avg + ' lbs' + goalSyncMsg + '\n\nNote: Program weights for future sessions use the ONE_RM constant in the code. To recalculate ALL program prescriptions from this new e1RM, update ONE_RM in the source file and redeploy.');
                                                        }} className="flex-1 py-3 rounded-lg text-white font-bold" style={{background:'#00A3A3'}}>
                                                            Update {calcLift} 1RM → {calcResult.avg} lbs
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="glass rounded-xl shadow-lg p-6">
                                            <h3 className="text-lg font-bold mb-4" style={{color:'#005F87', fontFamily:'Arial,sans-serif'}}>Current Working 1RMs</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                {Object.entries(data.oneRepMaxes || ONE_RM).map(([lift, max]) => {
                                                    const goal = {Squat:365,'Bench Press':275,'Trap Bar Deadlift':450,'Power Clean':225}[lift];
                                                    const pct = goal ? Math.round(max / goal * 100) : 0;
                                                    return (
                                                        <div key={lift} className="rounded-lg p-4 border" style={{borderColor:'rgba(0,95,135,0.15)'}}>
                                                            <p className="text-xs font-semibold mb-1" style={{color:'#565A5C'}}>{lift}</p>
                                                            <p className="text-2xl font-bold" style={{color:'#005F87'}}>{max} <span className="text-sm font-normal" style={{color:'#565A5C'}}>lbs</span></p>
                                                            {goal && (
                                                                <div className="mt-2">
                                                                    <div className="flex justify-between text-xs" style={{color:'#565A5C'}}><span>{pct}%</span><span>Goal: {goal}</span></div>
                                                                    <div className="w-full rounded-full h-2 mt-1" style={{background:'rgba(0,95,135,0.1)'}}>
                                                                        <div className="rounded-full h-2" style={{width: Math.min(pct,100)+'%', background: pct >= 100 ? '#00A3A3' : '#005F87'}}></div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            <p className="text-xs mt-4" style={{color:'#565A5C'}}>Retest every 8-12 weeks. Update ONE_RM in source code to recalculate all programmed weights across the 56-week plan.</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.body.innerHTML += '<div style="color: white; background: rgba(255,0,0,0.8); margin: 20px; padding: 20px; border-radius: 10px;"><h2>Error</h2><p>' + error.message + '</p></div>';
                console.error(error);
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered, scope:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
